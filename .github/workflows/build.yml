name: Build Distributable

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:
    inputs:
      upload_release_assets:
        description: 'Release tag to upload assets to (e.g. v0.1.1)'
        required: false
        default: ''
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Disable macOS Apple Silicon (ARM) app bundle release as its size exceeds the GitHub release limit
          # - os: macos-latest
          #   name: macOS (arm64)
          #   os_name: macos
          #   arch: arm64
          #   archive_ext: zip
          # macOS Intel (x86_64) is disabled because TensorFlow dropped macOS x86_64
          # wheels starting with 2.21.0, and Perch 2.0 doesn't support Intel mac either
          # - os: macos-15-intel
          #   name: macOS (x86_64)
          #   os_name: macos
          #   arch: x86_64
          #   archive_ext: zip
          - os: windows-latest
            name: Windows
            os_name: windows
            arch: x86_64
            archive_ext: zip
          - os: ubuntu-latest
            name: Linux (x86_64)
            os_name: linux
            arch: x86_64
            archive_ext: tar.gz
          - os: ubuntu-24.04-arm
            name: Linux (arm64)
            os_name: linux
            arch: arm64
            archive_ext: tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set VERSION and ARCHIVE_NAME
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            echo "VERSION=${{ github.ref_name }}" >> $GITHUB_ENV
          elif [[ -n "${{ inputs.upload_release_assets }}" ]]; then
            echo "VERSION=${{ inputs.upload_release_assets }}" >> $GITHUB_ENV
          else
            echo "VERSION=dev" >> $GITHUB_ENV
          fi
          echo "ARCHIVE_NAME=PAM-Analyzer-${{ matrix.os_name }}-${{ matrix.arch }}.${{ matrix.archive_ext }}" >> $GITHUB_ENV

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0

      - name: Install system dependencies
        # On Linux Qt requires libEGL.so.1, libpulse.so.0, the X11, and gstreamer libs
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y libegl1 libpulse0 libxkbcommon-x11-0 libxcb-cursor0 libxcb-util1 libxcb-render-util0 libxcb-image0 libxcb-shape0 libxcb-xkb1 libxcb-icccm4 libxcb-keysyms1 libtiff6 libminizip1t64 libgstreamer-plugins-base1.0-0 libgstreamer-plugins-good1.0-0 libgstreamer-plugins-bad1.0-0 libgstreamer-gl1.0-0 

      - name: Cache BirdNET models
        uses: actions/cache@v5
        with:
          path: dist/.birdnet-models
          key: birdnet-models-${{ hashFiles('uv.lock') }}

      - name: Prewarm models
        # Populates the cache (with retry-on-failure) before tests run, so a cold
        # cache never triggers a bare, un-retried download from inside pytest.
        run: uv run --script scripts/build.py --prewarm-only

      - name: Run tests
        env:
          BIRDNET_APP_DATA: ${{ github.workspace }}/dist/.birdnet-models/birdnet-app-data
          KAGGLEHUB_CACHE: ${{ github.workspace }}/dist/.birdnet-models/kagglehub
        run: uv run poe test

      - name: Build distributable
        run: uv run --script scripts/build.py

      - name: Package archive
        shell: bash
        run: |
          cd dist
          versioned="pam-analyzer-${VERSION}-${{ matrix.os_name }}-${{ matrix.arch }}"
          case "${{ matrix.os_name }}" in
            macos)
              mv pam-analyzer.app "${versioned}.app"
              zip -r -9 "$ARCHIVE_NAME" "${versioned}.app"
              rm -rf "${versioned}.app"
              ;;
            windows)
              mv pam-analyzer.exe "${versioned}.exe"
              7z a -mx=9 "$ARCHIVE_NAME" "${versioned}.exe"
              ;;
            linux)
              mv pam-analyzer "$versioned"
              tar -czf "$ARCHIVE_NAME" "$versioned"
              ;;
          esac

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-${{ matrix.name }}
          path: dist/
          if-no-files-found: error

      - name: Upload release asset
        if: github.event_name == 'release' || inputs.upload_release_assets != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          files: dist/${{ env.ARCHIVE_NAME }}
          fail_on_unmatched_files: true
