name: Build Distributable

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      upload_release_assets:
        description: 'Release tag to upload assets to (e.g. v0.1.1)'
        required: false
        default: ''
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: macos-latest
            name: macOS (arm64)
            os_name: macos
            arch: arm64
            archive_ext: zip
          # macOS Intel (x86_64) is disabled because TensorFlow dropped macOS x86_64
          # wheels starting with 2.21.0, and birdnet-analyzer requires tensorflow>=2.20.
          # Re-enable if TensorFlow resumes x86_64 macOS support or birdnet-analyzer
          # drops the TensorFlow dependency.
          # - os: macos-15-intel
          #   name: macOS (x86_64)
          #   os_name: macos
          #   arch: x86_64
          #   archive_ext: zip
          - os: windows-latest
            name: Windows
            os_name: windows
            arch: x86_64
            archive_ext: zip
          - os: ubuntu-latest
            name: Linux (x86_64)
            os_name: linux
            arch: x86_64
            archive_ext: tar.gz
          - os: ubuntu-24.04-arm
            name: Linux (arm64)
            os_name: linux
            arch: arm64
            archive_ext: tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set VERSION and ARCHIVE_NAME
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            echo "VERSION=${{ github.ref_name }}" >> $GITHUB_ENV
          elif [[ -n "${{ inputs.upload_release_assets }}" ]]; then
            echo "VERSION=${{ inputs.upload_release_assets }}" >> $GITHUB_ENV
          else
            echo "VERSION=dev" >> $GITHUB_ENV
          fi
          echo "ARCHIVE_NAME=PAM-Analyzer-${{ matrix.os_name }}-${{ matrix.arch }}.${{ matrix.archive_ext }}" >> $GITHUB_ENV

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0

      - name: Cache BirdNET checkpoints
        uses: actions/cache@v5
        with:
          path: scripts/.birdnet-checkpoints
          key: birdnet-checkpoints-${{ hashFiles('uv.lock') }}

      # pywebview on Linux uses GTK3 + WebKit2GTK, which have no pre-built wheels
      # and require system libraries to be present at build time.
      - name: Install GTK+ build dependencies (Linux only)
        if: matrix.os_name == 'linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev libwebkit2gtk-4.1-dev \
            libglib2.0-dev libpango1.0-dev libcairo2-dev \
            gir1.2-webkit2-4.1

      - name: Build distributable
        run: uv run --script scripts/build.py

      - name: Package archive
        shell: bash
        run: |
          cd scripts/dist
          versioned="pam-analyzer-${VERSION}-${{ matrix.os_name }}-${{ matrix.arch }}"
          case "${{ matrix.os_name }}" in
            macos)
              mv pam-analyzer.app "${versioned}.app"
              zip -r "$ARCHIVE_NAME" "${versioned}.app"
              rm -rf "${versioned}.app"
              ;;
            windows)
              mv pam-analyzer.exe "${versioned}.exe"
              7z a "$ARCHIVE_NAME" "${versioned}.exe"
              ;;
            linux)
              mv pam-analyzer "$versioned"
              tar -czf "$ARCHIVE_NAME" "$versioned"
              ;;
          esac

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-${{ matrix.name }}
          path: scripts/dist/
          if-no-files-found: error

      - name: Upload release asset
        if: github.event_name == 'release' || inputs.upload_release_assets != ''
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$VERSION" "scripts/dist/$ARCHIVE_NAME" --clobber
